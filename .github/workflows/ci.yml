name: Security Monitor CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linter
        run: pip install flake8
      - name: Lint security_check.py
        run: flake8 security_check.py --max-line-length=120 --ignore=E501,W503

  lint-powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint setup.ps1
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck
          $results = Invoke-ScriptAnalyzer -Path .\setup.ps1 -Severity Error
          if ($results) {
            $results | Format-Table
            exit 1
          }

  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Syntax check
        run: python -m py_compile security_check.py && echo "Syntax OK"
